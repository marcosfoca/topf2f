# WAHA (WhatsApp HTTP API) — Fly.io deployment
# Driver: NOWEB (Baileys, sin Chromium, cabe en 256MB)

app = "topf2f-waha"
primary_region = "mad"

[build]
  image = "devlikeapro/waha:noweb"

[env]
  WHATSAPP_DEFAULT_DRIVER = "NOWEB"
  WAHA_SESSIONS_PATH      = "/app/.sessions"
  WAHA_WEBHOOKS_EVENTS    = "message,message.ack"
  # WAHA_API_KEY y WAHA_WEBHOOKS_URLS se ponen como secrets (ver guía)

[[mounts]]
  source      = "waha_sessions"
  destination = "/app/.sessions"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
